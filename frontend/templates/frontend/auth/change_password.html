{% extends "frontend/base.html" %}

{% block title %}Change Password | Pawze{% endblock %}

{% block content %}
<section class="form-shell narrow">
  <div class="form-intro">
    <p class="eyebrow">Security Requirement</p>
    <h1>Change your password</h1>
    <p>The administrator has requested that you update your password before accessing the Pawze system dashboards.</p>
  </div>
  <form class="panel-form" method="post">
    {% csrf_token %}
    <div class="form-grid">
      <label class="field span-2">
        <span>New Password</span>
        <input name="password" type="password" autocomplete="new-password" required placeholder="Min 8 characters">
      </label>
      <label class="field span-2">
        <span>Confirm New Password</span>
        <input name="password_confirm" type="password" autocomplete="new-password" required placeholder="Verify new password">
      </label>
    </div>
    <button class="button-primary" type="submit">Update Password</button>
  </form>
</section>
{% endblock %}
